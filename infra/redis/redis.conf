# NexPulse Redis Configuration

# Memory
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec

# Latency tracking (for Grafana visibility)
latency-tracking yes
latency-tracking-info-percentiles 50 99 99.9

# Slow log (queries slower than 10ms)
slowlog-log-slower-than 10000
slowlog-max-len 128

# Networking
tcp-keepalive 300
timeout 0

# Keyspace notifications (for monitoring)
notify-keyspace-events ""

# Logging
loglevel notice
